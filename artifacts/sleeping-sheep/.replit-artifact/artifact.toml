kind = "web"
previewPath = "/"
title = "Sleeping Sheep"
version = "1.0.0"
id = "artifacts/sleeping-sheep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21165

[services.development]
run = "pnpm --filter @workspace/sleeping-sheep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sleeping-sheep", "run", "build" ]
publicDir = "artifacts/sleeping-sheep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21165"
BASE_PATH = "/"
