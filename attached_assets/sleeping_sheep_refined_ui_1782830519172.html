<style>
@keyframes tw { 0%,100%{opacity:.2} 50%{opacity:.85} }
.ss-star{position:absolute;border-radius:50%;background:#d4cef7;animation:tw 4.5s ease-in-out infinite}
.ss *{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',-apple-system,sans-serif;box-sizing:border-box}
</style>
<div style="background:var(--surface-1);border-radius:16px;padding:24px;display:flex;justify-content:center">
  <div style="width:300px;border-radius:42px;padding:9px;background:#08080f;box-shadow:0 16px 44px rgba(25,18,60,.5)">
    <div class="ss" style="position:relative;overflow:hidden;border-radius:34px;height:600px;display:flex;flex-direction:column;background:radial-gradient(125% 75% at 50% 20%, #2c2553 0%, #1d1839 44%, #100e1f 100%)">

      <span class="ss-star" style="width:2px;height:2px;top:46px;left:40px"></span>
      <span class="ss-star" style="width:3px;height:3px;top:88px;left:230px;animation-delay:1.2s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:130px;left:60px;animation-delay:.6s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:70px;left:150px;animation-delay:2.1s"></span>
      <span class="ss-star" style="width:3px;height:3px;top:200px;left:250px;animation-delay:1.7s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:175px;left:30px;animation-delay:.3s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:300px;left:255px;animation-delay:2.6s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:420px;left:48px;animation-delay:1.1s"></span>
      <span class="ss-star" style="width:2px;height:2px;top:470px;left:235px;animation-delay:1.9s"></span>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 24px 0;color:#bdb6e8;font-size:12px;font-weight:500">
        <span>9:41</span>
        <i class="ti ti-moon" style="font-size:14px" aria-hidden="true"></i>
      </div>

      <div style="display:flex;justify-content:center;margin-top:46px">
        <div style="position:relative;width:170px;height:150px;display:flex;align-items:center;justify-content:center">
          <div style="position:absolute;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle, rgba(150,128,238,.40) 0%, rgba(150,128,238,0) 66%)"></div>
          <i class="ti ti-moon-stars" style="font-size:66px;color:#f3eeff" aria-hidden="true"></i>
        </div>
      </div>

      <div style="padding:34px 30px 0;text-align:center">
        <div style="font-size:11px;letter-spacing:4px;color:#8d84c2;font-weight:500;margin-bottom:18px">sleeping sheep</div>
        <h1 style="font-size:22px;line-height:1.45;font-weight:500;color:#f5f2ff;margin:0">오늘 하루,<br>양에게 들려주세요</h1>
        <p style="font-size:13px;line-height:1.75;color:#aaa3d2;margin:16px 0 0">눈을 감기 전, 작은 양이<br>당신의 이야기를 기다리고 있어요.</p>
      </div>

      <div style="flex:1"></div>

      <div style="padding:0 26px 30px">
        <button style="width:100%;height:56px;border:none;border-radius:20px;background:linear-gradient(135deg,#8275e8 0%,#5b4fc6 100%);color:#fff;font-size:16px;font-weight:500;letter-spacing:1.5px;box-shadow:0 10px 26px rgba(108,88,224,.42);display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer">
          <i class="ti ti-moon" style="font-size:18px" aria-hidden="true"></i>수면 시작
        </button>
        <div style="display:flex;justify-content:center;margin-top:22px">
          <div style="display:flex;align-items:center;gap:7px;color:#9890c4;font-size:13px;font-weight:500;padding:8px 16px;border-radius:14px;background:rgba(255,255,255,.05)">
            <i class="ti ti-history" style="font-size:15px" aria-hidden="true"></i>지난 양들
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
